<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>儿童档案</title><link rel="icon" href="data:,"><link rel="stylesheet" href="../assets/app.css"></head>
<body>
  <main class="stage"><section class="phone">
    <div class="statusbar"><span>9:41</span><div class="status-icons"><span class="signal"></span><span class="signal"></span><span class="signal"></span><span class="battery"></span></div></div>
    <div class="app has-tabbar">
      <header class="top centered"><div class="titleblock"><h1>儿童档案</h1></div></header>
      <section class="card grid">
        <div class="section-title" style="margin:0;"><h2>基础信息</h2><button class="text-link" data-open-photo-sheet="profile-edit">编辑</button></div>
        <table class="table">
          <tbody><tr><th>姓名</th><td>林小雨</td></tr><tr><th>生日</th><td>2021-09-18</td></tr><tr><th>性别</th><td>女</td></tr><tr><th>班级</th><td>中一班</td></tr>
        </tbody></table>
      </section>
      <div class="section-title"><h2>成长信息</h2><span class="small">教师推送后可见</span></div>
      <section class="grid">
        <a class="card row" href="growth-record.html"><div class="row-main"><span class="icon">成</span><div class="row-text"><h3>成长档案</h3><p>过程素材 · 按月汇聚时间线</p></div></div><span class="status done">已推送</span></a>
        <a class="card row" href="evaluation-report.html?from=profile"><div class="row-main"><span class="icon">评</span><div class="row-text"><h3>评价/评估报告</h3><p>月度、学期与综合评估报告</p></div></div><span class="status info">新报告</span></a>
        <a class="card row" href="growth-book.html?from=profile"><div class="row-main"><span class="icon">册</span><div class="row-text"><h3>成长册</h3><p>学期成品 · 查看生成进度与缺失项</p></div></div><span class="status warn">生成中</span></a>
      </section>
    </div>

    <div class="sheet" data-photo-sheet="profile-edit" hidden>
      <div class="sheet-backdrop" data-close-photo-sheet="profile-edit"></div>
      <div class="sheet-panel">
        <div class="sheet-head">
          <div><h2>编辑个人信息</h2><p>修改后教师端将同步更新</p></div>
          <button class="icon-button" data-close-photo-sheet="profile-edit" aria-label="关闭">×</button>
        </div>
        <div class="field"><label for="edit-name">姓名</label><input id="edit-name" type="text" value="林小雨" placeholder="请输入孩子姓名"></div>
        <div class="field"><label for="edit-birth">生日</label><input id="edit-birth" type="date" value="2021-09-18"></div>
        <div class="field"><label for="edit-gender">性别</label>
          <select id="edit-gender"><option>女</option><option>男</option></select>
        </div>
        <div class="field"><label for="edit-class">班级</label>
          <select id="edit-class"><option>中一班</option><option>中二班</option><option>中三班</option></select>
        </div>
        <button class="primary" data-submit-demo="个人信息已更新" data-close-photo-sheet="profile-edit">保存修改</button>
      </div>
    </div>
    <nav class="tabbar" aria-label="底部导航">
      <a class="tab-item" href="../home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.7V21h14V9.7"/></svg>首页</a>
      <a class="tab-item" href="evaluation-tasks.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3.5" width="14" height="17.5" rx="2.5"/><path d="m9 12.5 2.2 2.2 4.3-4.4"/></svg>我的任务</a>
      <a class="tab-item" href="kindergarten-moments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><circle cx="8.5" cy="10" r="1.6"/><path d="m5 17 4.2-4.2 3 3 3.4-3.4L21 17"/></svg>在园时光</a>
      <a class="tab-item on" href="child-profile.html" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.2" r="3.6"/><path d="M4.8 20c1.6-3.8 4.6-5.2 7.2-5.2s5.6 1.4 7.2 5.2"/></svg>儿童档案</a>
    </nav>
  </section></main>
  <script src="../assets/app.js"></script>
</body></html>
