<!doctype html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>历史评价详情</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <main class="stage"><section class="phone">
    <div class="statusbar"><span>9:41</span><div class="status-icons"><span class="signal"></span><span class="signal"></span><span class="signal"></span><span class="battery"></span></div></div>
    <div class="app" data-history-detail>
      <header class="top">
        <a class="back" href="evaluation-tasks.html" data-dynamic-back>‹</a>
        <div class="titleblock"><h1 data-history-title>历史评价</h1><p></p></div>
      </header>

      <article class="card eval-detail-card">
        <div class="eval-history-head">
          <div>
            <h2 data-history-heading>5 月月度评价</h2>
            <p data-history-meta>2026.05.28 提交</p>
          </div>
          <span class="status done" data-history-type>月度</span>
        </div>
        <div class="eval-copy" data-history-copy>
          <p>这个月小雨在家里更愿意主动表达自己的想法。睡前共读时，她会把故事里的角色和白天在幼儿园发生的事情联系起来，也会提醒我们一起收拾绘本。</p>
          <p>周末去社区花园时，她能主动观察植物变化，并愿意把看到的小花、小虫讲给家人听。希望下个月继续鼓励她用画画和照片记录自己的发现。</p>
        </div>
        <div class="eval-detail-photos" data-history-radar hidden></div>
        <div class="eval-detail-photos">
          <h3>评价照片</h3>
          <div class="eval-photo-grid" style="--photo-cols: 3;" data-history-photos>
            <div class="eval-photo green">共读 1</div>
            <div class="eval-photo green">共读 2</div>
            <div class="eval-photo blue">花园</div>
          </div>
        </div>
      </article>
    </div>
  </section></main>
  <script src="../assets/app.js"></script>
</body></html>
