<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家长端 · 四个一级页面总览</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #f3f1ec;
      --fg: #1a1916;
      --muted: #77736a;
      --border: rgba(26, 25, 22, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      min-height: 100vh;
      padding: 32px 36px 44px;
    }
    footer.overview {
      margin-top: 28px;
      text-align: center;
    }
    footer.overview h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    footer.overview p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      align-items: start;
      width: 75%;
      margin: 0 auto;
    }
    .panel {
      min-width: 0;
    }
    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .panel-head h2 {
      font-size: 15px;
      font-weight: 600;
    }
    .panel-head a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }
    .panel-head a:hover { color: var(--fg); }
    /* 手机框按列宽等比缩放：iframe 固定 390×844 设计尺寸，用 transform 缩到列宽 */
    .frame-fit {
      position: relative;
      width: 100%;
      aspect-ratio: 390 / 844;
    }
    .frame-fit iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 390px;
      height: 844px;
      transform-origin: top left;
      border: 1px solid var(--border);
      border-radius: 40px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(26, 25, 22, 0.1);
    }
  </style>
</head>
<body>
  <main class="board" data-od-id="tab-board">
    <section class="panel" data-od-id="panel-home">
      <div class="panel-head"><h2>首页</h2><a href="home.html">单独打开 ›</a></div>
      <div class="frame-fit"><iframe src="home.html" title="首页"></iframe></div>
    </section>
    <section class="panel" data-od-id="panel-tasks">
      <div class="panel-head"><h2>我的任务</h2><a href="screens/evaluation-tasks.html">单独打开 ›</a></div>
      <div class="frame-fit"><iframe src="screens/evaluation-tasks.html" title="我的任务"></iframe></div>
    </section>
    <section class="panel" data-od-id="panel-moments">
      <div class="panel-head"><h2>在园时光</h2><a href="screens/kindergarten-moments.html">单独打开 ›</a></div>
      <div class="frame-fit"><iframe src="screens/kindergarten-moments.html" title="在园时光"></iframe></div>
    </section>
    <section class="panel" data-od-id="panel-profile">
      <div class="panel-head"><h2>儿童档案</h2><a href="screens/child-profile.html">单独打开 ›</a></div>
      <div class="frame-fit"><iframe src="screens/child-profile.html" title="儿童档案"></iframe></div>
    </section>
  </main>
  <footer class="overview" data-od-id="overview-footer">
    <h1>化龙幼儿园 · 家长端</h1>
    <p>四个一级 Tab 页并排预览，点击页面标题旁「单独打开」可全屏查看。</p>
  </footer>
  <script>
    // 将 390×844 的手机框等比缩放到各自列宽，保证 4 列刚好占满一屏、无横向滚动
    function fitFrames() {
      document.querySelectorAll('.frame-fit').forEach(function (box) {
        var scale = box.clientWidth / 390;
        box.firstElementChild.style.transform = 'scale(' + scale + ')';
      });
    }
    window.addEventListener('resize', fitFrames);
    window.addEventListener('load', fitFrames);
    fitFrames();
  </script>
</body>
</html>
